<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISS School Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .event-card { transition: all 0.3s ease; }
        .event-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        
        /* This ensures columns stay side-by-side and don't squash */
        .category-group { 
            min-width: 320px; 
            flex: 1; 
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #f1f5f9;
        }

        /* Hide scrollbar for a cleaner look but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen pb-20">

    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter">RISS events system</h1>
            <div id="live-clock" class="text-xs font-mono text-slate-400"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-12">
        <header class="mb-12">
            <h2 class="text-4xl font-extrabold tracking-tight mb-2 text-slate-900">What's happening in our school?</h2>
            <p class="text-slate-500 text-lg">Live school activitys from Microsoft Forms.</p>
        </header>

        <section class="mb-20">
            <div class="flex items-center gap-4 mb-8">
                <h3 class="text-xs font-black uppercase tracking-[0.2em] text-blue-500">Live & Upcoming</h3>
                <span class="h-px bg-slate-200 flex-grow"></span>
            </div>
            
            <div id="upcoming-container" class="flex flex-row gap-6 overflow-x-auto pb-8 no-scrollbar">
                <div class="w-full text-center py-20 text-slate-400 animate-pulse">
                    Syncing with school database...
                </div>
            </div>
        </section>

        <section>
            <div class="flex items-center gap-4 mb-8">
                <h3 class="text-xs font-black uppercase tracking-[0.2em] text-slate-400">Archive</h3>
                <span class="h-px bg-slate-200 flex-grow"></span>
            </div>
            <div id="archive-container" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6 opacity-60">
            </div>
        </section>
    </main>

    <script>
        async function loadEvents() {
            const upcomingContainer = document.getElementById('upcoming-container');
            const archiveContainer = document.getElementById('archive-container');
            
            try {
                const response = await fetch('events.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error("Data file not found");
                
                const data = await response.json();
                upcomingContainer.innerHTML = ''; 
                archiveContainer.innerHTML = '';

                if (data.length === 0) {
                    upcomingContainer.innerHTML = '<div class="w-full text-center p-10 bg-white rounded-3xl border-2 border-dashed border-slate-200 text-slate-400">No active events found. Submit a Form to see it here!</div>';
                    return;
                }

                const upcomingData = data.filter(e => e.status === "Upcoming" || !e.status);
                const archiveData = data.filter(e => e.status === "Archive");

                const categories = [...new Set(upcomingData.map(e => e.category || 'General'))];
                
                categories.forEach(cat => {
                    const col = document.createElement('div');
                    col.className = "category-group space-y-4";
                    
                    col.innerHTML = `
                        <div class="flex justify-between items-center mb-6 px-2">
                            <h4 class="font-black text-[10px] uppercase tracking-widest text-slate-400">${cat}</h4>
                            <span class="w-2 h-2 rounded-full bg-blue-400 animate-ping"></span>
                        </div>
                    `;

                    const catEvents = upcomingData.filter(e => (e.category || 'General') === cat);
                    catEvents.forEach(event => {
                        col.innerHTML += createEventCard(event, true);
                    });

                    upcomingContainer.appendChild(col);
                });

                if (archiveData.length === 0) {
                    archiveContainer.innerHTML = '<p class="col-span-full text-slate-300 text-sm italic">No archived records.</p>';
                } else {
                    archiveData.forEach(event => {
                        archiveContainer.innerHTML += createEventCard(event, false);
                    });
                }

            } catch (error) {
                upcomingContainer.innerHTML = `
                    <div class="w-full p-10 bg-red-50 text-red-600 rounded-3xl border border-red-100 text-center">
                        <strong>System Error:</strong> ${error.message} <br>
                        <span class="text-xs">Ensure 'events.json' is in your GitHub repository.</span>
                    </div>`;
            }
        }

        function createEventCard(event, isUpcoming) {
            // Logic to handle time strings
            const timeDisplay = (event.startTime && event.endTime) 
                ? `${event.startTime} - ${event.endTime}` 
                : (event.startTime || 'Time TBD');

            return `
                <div class="event-card bg-white p-6 rounded-2xl border border-slate-50 shadow-sm flex flex-col h-full">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-bold font-mono text-blue-500">${event.date || 'TBD'}</span>
                        ${!isUpcoming ? '<span class="text-[8px] bg-slate-100 px-2 py-0.5 rounded text-slate-400 uppercase font-black">Passed</span>' : ''}
                    </div>
                    
                    <h4 class="text-lg font-bold text-slate-900 mb-1 leading-tight">${event.title || 'Untitled Event'}</h4>
                    
                    <div class="flex flex-wrap gap-x-4 gap-y-1 mb-4">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">
                            📍 ${event.location || 'No Location'}
                        </span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">
                            ⏰ ${timeDisplay}
                        </span>
                    </div>

                    <p class="text-slate-500 text-xs leading-relaxed flex-grow">${event.description || 'No details provided.'}</p>
                    
                    <div class="mt-6 pt-4 border-t border-slate-50">
                        <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest italic">RISS Hub Official</span>
                    </div>
                </div>
            `;
        }

        setInterval(() => {
            const clock = document.getElementById('live-clock');
            if(clock) clock.innerText = new Date().toLocaleTimeString();
        }, 1000);

        loadEvents();
    </script>
</body>
</html>
