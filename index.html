    <style>
        .event-card { transition: all 0.3s ease; border-radius: 24px; width: 100%; }
        .event-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        
        .category-container {
            display: flex;
            flex-direction: row;
            gap: 24px;
            align-items: flex-start;
            overflow-x: auto;
            padding-bottom: 20px;
        }

        .category-group { 
            min-width: 320px; 
            max-width: 350px;
            flex-shrink: 0;
            background: #ffffff; 
            border-radius: 28px; 
            padding: 24px; 
            border: 1px solid #f1f5f9; 
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
