<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISS School Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .event-card { transition: all 0.3s ease; border-radius: 24px; width: 100%; }
        .event-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        
        .category-container {
            display: flex;
            flex-direction: row;
            gap: 24px;
            align-items: flex-start;
            overflow-x: auto;
            padding-bottom: 20px;
        }

        .category-group { 
            min-width: 320px; 
            max-width: 350px;
            flex-shrink: 0;
            background: #ffffff; 
            border-radius: 28px; 
            padding: 24px; 
            border: 1px solid #f1f5f9; 
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen pb-20">

    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter uppercase">RISS EVENTS</h1>
            <div id="live-clock" class="text-xs font-mono text-slate-400"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-12">
        <header class="mb-12">
            <h2 class="text-5xl font-black tracking-tight mb-2 text-slate-900">School Activities</h2>
            <p class="text-slate-500 text-lg">Live Events From Microsoft Forms.</p>
        </header>

        <section class="mb-20">
            <div class="flex items-center gap-4 mb-8">
                <h3 class="text-xs font-black uppercase tracking-[0.2em] text-blue-500 tracking-widest">Upcoming</h3>
                <span class="h-px bg-slate-200 flex-grow"></span>
            </div>
            
            <div id="upcoming-container" class="category-container no-scrollbar">
                <div class="w-full text-center py-20 text-slate-300 animate-pulse font-mono text-xs">Loading Data...</div>
            </div>
        </section>

        <section>
            <div class="flex items-center gap-4 mb-8">
                <h3 class="text-xs font-black uppercase tracking-[0.2em] text-slate-400 tracking-widest">Archive</h3>
                <span class="h-px bg-slate-200 flex-grow"></span>
            </div>
            <div id="archive-container" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6 opacity-40"></div>
        </section>
    </main>

    <script>
        // Use a standard function call to avoid DOM blockages
        async function loadEvents() {
            const upcomingContainer = document.getElementById('upcoming-container');
            const archiveContainer = document.getElementById('archive-container');
            
            try {
                // Fetch with a cache-buster
                const response = await fetch('./events.json?v=' + Date.now());
                
                if (!response.ok) {
                    throw new Error("Events file not found on server.");
                }
                
                const rawData = await response.json();
                const data = Array.isArray(rawData) ? rawData : [rawData];
                
                // Reset containers
                upcomingContainer.innerHTML = ''; 
                archiveContainer.innerHTML = '';

                if (!data || data.length === 0 || !data[0]) {
                    upcomingContainer.innerHTML = '<div class="w-full text-center py-10 text-slate-400">No events found in the database.</div>';
                    return;
                }

                // Sorting
                const upcomingData = data.filter(e => (e.status || e.Status || '').toLowerCase() !== "archive");
                const archiveData = data.filter(e => (e.status || e.Status || '').toLowerCase() === "archive");

                // Render Upcoming Categories
                const categories = [...new Set(upcomingData.map(e => e.category || e.Category || 'General'))];
                
                categories.forEach(cat => {
                    const col = document.createElement('div');
                    col.className = "category-group";
                    col.innerHTML = `<h4 class="font-black text-[10px] uppercase tracking-widest text-slate-400 mb-2 px-2 underline decoration-blue-500/30 decoration-2 underline-offset-8">${cat}</h4>`;
                    
                    const catEvents = upcomingData.filter(e => (e.category || e.Category || 'General') === cat);
                    catEvents.forEach(event => {
                        col.innerHTML += createEventCard(event);
                    });
                    upcomingContainer.appendChild(col);
                });

                // Render Archive
                archiveData.forEach(event => {
                    archiveContainer.innerHTML += createEventCard(event);
                });

            } catch (error) {
                console.error("Critical Error:", error);
                upcomingContainer.innerHTML = `<div class="bg-red-50 text-red-500 p-8 rounded-3xl border border-red-100 w-full text-center font-bold uppercase tracking-widest text-[10px]">Error: ${error.message}</div>`;
            }
        }

        function createEventCard(event) {
            const title = event.title || event.Title || 'Untitled Event';
            const loc = event.location || event.Location || 'Room TBD';
            const start = event.startTime || event.StartTime || ''; 
            const end = event.endTime || event.EndTime || event.endingTime || event.EndingTime || ''; 
            const date = event.date || event.Date || 'No Date';
            const desc = event.description || event.Description || 'No description provided.';
            
            let timeDisplay = (start && end) ? `${start} - ${end}` : (start || 'Time TBD');

            return `
                <div class="event-card bg-white p-6 border border-slate-100 shadow-sm flex flex-col">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-bold font-mono text-blue-600 bg-blue-50 px-2 py-1 rounded-md tracking-tighter">${date}</span>
                    </div>
                    <h4 class="text-lg font-black text-slate-900 mb-4 leading-tight lowercase first-letter:uppercase">${title}</h4>
                    <div class="bg-slate-50/50 rounded-xl p-3 space-y-2 mb-4 border border-slate-100/50">
                        <div class="text-[10px] font-bold text-slate-600 uppercase tracking-tight flex items-center gap-2">
                            <span>📍</span> <span>${loc}</span>
                        </div>
                        <div class="text-[10px] font-bold text-slate-600 uppercase tracking-tight flex items-center gap-2">
                            <span>⏰</span> <span>${timeDisplay}</span>
                        </div>
                    </div>
                    <p class="text-slate-500 text-xs leading-relaxed italic">${desc}</p>
                </div>
            `;
        }

        // Initialize
        loadEvents();

        // Clock
        setInterval(() => {
            const clock = document.getElementById('live-clock');
            if(clock) clock.innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
